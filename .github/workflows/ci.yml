name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: uv sync

    - name: Run Ruff Linter
      run: uv run ruff check packages/

    - name: Run Ruff Formatter (check only)
      run: uv run ruff format --check packages/

    - name: Run MyPy (pararam-nexus-mcp)
      run: uv run mypy packages/pararam-nexus-mcp/src/pararam_nexus_mcp --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run pytest -v
      continue-on-error: true

  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Build pararam-nexus-mcp
      run: uv build --package pararam-nexus-mcp

    - name: Build pararam-nexus-channel
      run: uv build --package pararam-nexus-channel

    - name: Check distributions
      run: |
        uv pip install --system twine
        twine check dist/*
        ls -lah dist/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ github.sha }}
        path: dist/
        retention-days: 7
