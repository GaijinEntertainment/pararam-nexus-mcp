[project]
name = "pararam-nexus-mcp"
dynamic = ["version"]
description = "Model Context Protocol server for pararam.io - a modern communication and collaboration platform"
requires-python = ">=3.14"
license = { text = "MIT" }
authors = [
    { name = "Ilya Volnistov", email = "i.volnistov@gaijin.team" }
]
keywords = ["mcp", "pararam", "pararam.io", "communication", "messaging", "fastmcp", "async"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Communications :: Chat",
    "Topic :: Software Development :: Libraries",
    "Framework :: AsyncIO",
]
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "fastmcp>=0.1.0",
    "pararamio-aio>=3.0.13",
]

[project.urls]
Homepage = "https://github.com/GaijinEntertainment/pararam-nexus-mcp"
Repository = "https://github.com/GaijinEntertainment/pararam-nexus-mcp"
Issues = "https://github.com/GaijinEntertainment/pararam-nexus-mcp/issues"

[project.scripts]
pararam-nexus-mcp = "pararam_nexus_mcp.server:main"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
raw-options.root = "../.."

[tool.hatch.build.hooks.vcs]
version-file = "src/pararam_nexus_mcp/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/pararam_nexus_mcp"]
